<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTv - Jumelage Appareil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-black tracking-tight mb-2 bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">MegaTv Cloud</h1>
        <p class="text-zinc-400 text-sm mb-6">Entre tes identifiants pour connecter ta TV</p>

        <div id="auth-form" class="space-y-4">
            <input type="email" id="email" placeholder="Adresse Email" class="w-full px-5 py-3 rounded-full bg-zinc-950 border border-zinc-800 focus:border-white focus:outline-none transition text-sm">
            <input type="password" id="password" placeholder="Mot de passe" class="w-full px-5 py-3 rounded-full bg-zinc-950 border border-zinc-800 focus:border-white focus:outline-none transition text-sm">
            <button onclick="handleLogin()" class="w-full py-3 mt-2 rounded-full bg-white text-black font-bold text-sm hover:bg-zinc-200 transition duration-300">Se connecter et jumeler</button>
        </div>

        <div id="status-message" class="hidden mt-4 text-sm font-semibold p-3 rounded-full"></div>
    </div>

    <script>
        // Configuration de ton Supabase MegaTv avec tes vraies clés
        const SUPABASE_URL = "https://lciimaytmryruyooktkd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjaWltYXl0bXJ5cnV5b29rdGtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTEwNDAsImV4cCI6MjA5NDkyNzA0MH0.xj8ITmbNeKLShcdKcqvpy--V8B7EcBHkWGkNaENjilI";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Récupération du code TV dans l'URL (?code=XYZ)
        const urlParams = new URLSearchParams(window.location.search);
        const tvCode = urlParams.get('code');

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status-message');

            if (!tvCode) {
                showStatus("Erreur : Aucun code de jumelage trouvé dans l'URL.", "bg-red-950 text-red-400");
                return;
            }

            // 1. Connexion de l'utilisateur sur Supabase
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showStatus("Échec de l'authentification : " + error.message, "bg-red-950 text-red-400");
                return;
            }

            // 2. Mise à jour de la table de jumelage pour la TV
            const { error: pairError } = await supabase
                .from('tv_pairings')
                .update({ account_id: data.user.id, status: 'paired' })
                .eq('code', tvCode);

            if (pairError) {
                showStatus("Erreur de jumelage : " + pairError.message, "bg-red-950 text-red-400");
            } else {
                showStatus("✓ TV connectée avec succès ! Tu peux fermer cette page.", "bg-green-950 text-green-400");
                document.getElementById('auth-form').classList.add('hidden');
            }
        }

        function showStatus(text, classes) {
            const status = document.getElementById('status-message');
            status.className = `mt-4 text-sm font-semibold p-3 rounded-full ${classes}`;
            status.innerText = text;
            status.classList.remove('hidden');
        }
    </script>
</body>
</html>
